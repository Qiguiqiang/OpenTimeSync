name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64]
        include:
          - os: macos-latest
            arch: arm64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: |
          case "${{ matrix.os }}" in
            windows*) PLAT=win32;;
            ubuntu*)  PLAT=linux;;
            macos*)   PLAT=darwin;;
          esac
          npx @electron/packager . OpenTimeSync --platform=$PLAT --arch=${{ matrix.arch }} --out=dist --overwrite --icon=build/icon
      - name: Strip (remove bloat)
        run: |
          case "${{ matrix.os }}" in
            macos*)
              APP="dist/OpenTimeSync-darwin-${{ matrix.arch }}"
              ARCH="${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}"
              # Remove unnecessary locales
              find "$APP" -path '*/locales/*' ! -name 'en-US*' -delete
              # Remove SwiftShader/Vulkan
              rm -rf "$APP/OpenTimeSync.app/Contents/Frameworks/libswiftshader*" 2>/dev/null || true
              rm -rf "$APP/OpenTimeSync.app/Contents/Frameworks/libvk*" 2>/dev/null || true
              # lipo thin fat binaries
              for f in $(find "$APP" -type f -perm -o+x); do
                lipo -info "$f" 2>/dev/null | grep -q "Architectures in the fat file" && lipo -thin "$ARCH" "$f" -o "$f" 2>/dev/null
              done
              for f in $(find "$APP" -name '*.dylib' -type f); do
                lipo -info "$f" 2>/dev/null | grep -q "Architectures in the fat file" && lipo -thin "$ARCH" "$f" -o "$f" 2>/dev/null
              done;;
            ubuntu*)
              APP="dist/OpenTimeSync-linux-${{ matrix.arch }}"
              find "$APP" -path '*/locales/*' ! -name 'en-US*' -delete
              rm -rf "$APP/libswiftshader*" "$APP/libvk*" "$APP/vk_swiftshader*" "$APP/vulkan*" 2>/dev/null || true
              find "$APP" -type f -name '*.so' -exec strip --strip-debug {} \; 2>/dev/null || true
              strip "$APP/OpenTimeSync" 2>/dev/null || true;;
            windows*)
              APP="dist/OpenTimeSync-win32-${{ matrix.arch }}"
              find "$APP" -path '*/locales/*' ! -name 'en-US*' -delete
              rm -rf "$APP/libswiftshader*" "$APP/dxcompiler*" "$APP/dxil*" "$APP/vk_swiftshader*" "$APP/vulkan*" 2>/dev/null || true;;
          esac
      - name: Package
        run: |
          case "${{ matrix.os }}" in
            ubuntu*)  cd dist && tar -czf OpenTimeSync-linux-${{ matrix.arch }}.tar.gz OpenTimeSync-linux-${{ matrix.arch }}/ && cd ..;;
            windows*) cd dist && 7z a -tzip OpenTimeSync-win32-${{ matrix.arch }}.zip OpenTimeSync-win32-${{ matrix.arch }}/ && cd ..;;
            macos*)   cd dist && zip -r OpenTimeSync-macos-${{ matrix.arch }}.zip OpenTimeSync-darwin-${{ matrix.arch }}/ && cd ..;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          gh release create "${{ github.ref_name }}" --title "OpenTimeSync ${{ github.ref_name }}" --generate-notes --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-ubuntu-latest-x64/*.tar.gz --clobber --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-windows-latest-x64/*.zip --clobber --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-macos-latest-x64/*.zip --clobber --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-macos-latest-arm64/*.zip --clobber --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}