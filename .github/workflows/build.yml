name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "Windows build handled by electron-builder in next step"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx @electron/packager . OpenTimeSync --platform=darwin --arch=x64 --out=dist --overwrite --icon=build/icon
          else
            npx @electron/packager . OpenTimeSync --platform=linux --arch=x64 --out=dist --overwrite --icon=build/icon
          fi
        shell: bash

      - name: Build and package Windows (exe installer + portable + zip)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --config
        shell: bash

      - name: Build and package Windows (exe + zip)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --config
        shell: bash

      - name: Package Linux (deb + rpm + tar.gz)
        if: matrix.os == 'ubuntu-latest'
        run: |
          APP_DIR="dist/OpenTimeSync-linux-x64"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # Create .deb package
          mkdir -p pkgdeb/DEBIAN pkgdeb/usr/lib/opentimesync pkgdeb/usr/share/applications pkgdeb/usr/bin
          cp -r "$APP_DIR"/* pkgdeb/usr/lib/opentimesync/
          cat > pkgdeb/DEBIAN/control << EOF
Package: opentimesync
Version: $VERSION
Section: utils
Priority: optional
Architecture: amd64
Maintainer: OpenTimeSync Contributors
Description: High-precision time synchronization desktop app via NTP-weighted clock
 Built with Electron. Supports Windows, macOS, Linux.
EOF
          cat > pkgdeb/usr/share/applications/opentimesync.desktop << EOF
[Desktop Entry]
Name=OpenTimeSync
Comment=High-precision NTP time sync
Exec=/usr/lib/opentimesync/OpenTimeSync
Type=Application
Categories=Utility;
Terminal=false
EOF
          ln -s /usr/lib/opentimesync/OpenTimeSync pkgdeb/usr/bin/opentimesync
          dpkg-deb --build pkgdeb "dist/opentimesync_${VERSION}_amd64.deb"

          # Create .rpm package
          mkdir -p pkgrpm/BUILD pkgrpm/RPMS
          cat > pkgrpm/opentimesync.spec << EOF
Name: opentimesync
Version: $VERSION
Release: 1
Summary: High-precision NTP time sync desktop app
License: MIT
URL: https://github.com/Qiguiqiang/timeSyncWord
BuildArch: x86_64

%description
High-precision time synchronization desktop app via NTP-weighted clock.

%install
mkdir -p %{buildroot}/usr/lib/opentimesync
cp -r $APP_DIR/* %{buildroot}/usr/lib/opentimesync/
mkdir -p %{buildroot}/usr/share/applications
cat > %{buildroot}/usr/share/applications/opentimesync.desktop << DESKTOP_EOF
[Desktop Entry]
Name=OpenTimeSync
Exec=/usr/lib/opentimesync/OpenTimeSync
Type=Application
Categories=Utility;
Terminal=false
DESKTOP_EOF
mkdir -p %{buildroot}/usr/bin
ln -s /usr/lib/opentimesync/OpenTimeSync %{buildroot}/usr/bin/opentimesync

%files
/usr/lib/opentimesync/
/usr/share/applications/opentimesync.desktop
/usr/bin/opentimesync
EOF
          rpmbuild -bb pkgrpm/opentimesync.spec --define "_topdir $(pwd)/pkgrpm" 2>/dev/null || true
          find pkgrpm/RPMS -name "*.rpm" -exec cp {} dist/ \;
          
          # Keep tar.gz as fallback
          cd dist && tar -czf OpenTimeSync-linux-x64.tar.gz OpenTimeSync-linux-x64/ && cd ..
        shell: bash

      - name: Package macOS (dmg)
        if: matrix.os == 'macos-latest'
        run: hdiutil create -volname "OpenTimeSync" -srcfolder "dist/OpenTimeSync-darwin-x64/OpenTimeSync.app" -ov -format UDZO "dist/OpenTimeSync-macos.dmg"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}
          path: dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes \
            opentimesync-ubuntu-latest/*.deb \
            opentimesync-ubuntu-latest/*.rpm \
            opentimesync-ubuntu-latest/*.tar.gz \
            opentimesync-windows-latest/*.exe \
            opentimesync-windows-latest/*.zip \
            opentimesync-windows-latest/*.blockmap \
            opentimesync-macos-latest/*.dmg \
            --repo ${{ github.repository }} || \
          gh release upload "${{ github.ref_name }}" \
            opentimesync-ubuntu-latest/*.deb \
            opentimesync-ubuntu-latest/*.rpm \
            opentimesync-ubuntu-latest/*.tar.gz \
            opentimesync-windows-latest/*.exe \
            opentimesync-windows-latest/*.zip \
            opentimesync-windows-latest/*.blockmap \
            opentimesync-macos-latest/*.dmg \
            --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}