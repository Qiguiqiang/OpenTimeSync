name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx @electron/packager . OpenTimeSync --platform=win32 --arch=x64 --out=dist --overwrite --icon=build/icon
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx @electron/packager . OpenTimeSync --platform=darwin --arch=x64 --out=dist --overwrite --icon=build/icon
          else
            npx @electron/packager . OpenTimeSync --platform=linux --arch=x64 --out=dist --overwrite --icon=build/icon
          fi
        shell: bash

      - name: Package Windows (zip)
        if: matrix.os == 'windows-latest'
        run: cd dist && powershell -Command "Compress-Archive -Path OpenTimeSync-win32-x64 -DestinationPath OpenTimeSync-win32-x64.zip"
        shell: bash

      - name: Package Linux (tar.gz)
        if: matrix.os == 'ubuntu-latest'
        run: cd dist && tar -czf OpenTimeSync-linux-x64.tar.gz OpenTimeSync-linux-x64/
        shell: bash

      - name: Package macOS (dmg)
        if: matrix.os == 'macos-latest'
        run: hdiutil create -volname "OpenTimeSync" -srcfolder "dist/OpenTimeSync-darwin-x64/OpenTimeSync.app" -ov -format UDZO "dist/OpenTimeSync-macos.dmg"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}
          path: dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes \
            opentimesync-ubuntu-latest/*.tar.gz \
            opentimesync-windows-latest/*.zip \
            opentimesync-macos-latest/*.dmg \
            --repo ${{ github.repository }} || \
          gh release upload "${{ github.ref_name }}" \
            opentimesync-ubuntu-latest/*.tar.gz \
            opentimesync-windows-latest/*.zip \
            opentimesync-macos-latest/*.dmg \
            --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}